<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIIP Level 2 Lesson 12 Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Kantumruy Pro', 'Noto Sans KR', sans-serif;
            background: #fdf2f8; /* Light Pink theme for mistakes/blushing */
        }
        .korean { font-family: 'Noto Sans KR', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(244, 114, 182, 0.2);
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div id="app" class="max-w-2xl mx-auto px-4 pt-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-pink-800 mb-2">KIIP កម្រិត ២ - មេរៀនទី ១២</h1>
            <p class="text-gray-600">실수를 자주 하는 편이에요</p>
            <div id="progress-bar" class="w-full bg-gray-200 h-2 mt-4 rounded-full overflow-hidden">
                <div id="progress-fill" class="bg-pink-500 h-full w-0 transition-all duration-500"></div>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="glass-card rounded-2xl p-8 text-center shadow-xl border-t-4 border-pink-500">
            <div class="mb-6">
                <i class="fas fa-flushed text-6xl text-pink-500 animate-bounce"></i>
            </div>
            <h2 class="text-xl font-bold mb-4 text-gray-800">តើអ្នកធ្លាប់ធ្វើខុសខ្លះទេ?</h2>
            <ul class="text-left text-gray-600 mb-8 space-y-2 max-w-xs mx-auto">
                <li><i class="fas fa-check-circle text-pink-500 mr-2"></i> សំណួរសរុប៖ ៣០ សំណួរ</li>
                <li><i class="fas fa-check-circle text-pink-500 mr-2"></i> វេយ្យាករណ៍៖ -은 적이 있다, -는 편이다</li>
                <li><i class="fas fa-check-circle text-pink-500 mr-2"></i> វប្បធម៌៖ ការធ្វើខុស និងបទពិសោធន៍</li>
            </ul>
            <button onclick="quizManager.start()" class="w-full bg-pink-600 hover:bg-pink-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg">
                ចាប់ផ្ដើមតេស្ត
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden">
            <!-- Helper Tools -->
            <div class="flex justify-between mb-4 gap-2">
                <button onclick="quizManager.usePowerUp('translate')" class="flex-1 bg-white border border-pink-200 py-2 rounded-lg text-sm font-medium text-pink-600 hover:bg-pink-50 transition-all">
                    <i class="fas fa-language"></i> បកប្រែសំណួរ
                </button>
                <button onclick="quizManager.usePowerUp('fiftyFifty')" class="flex-1 bg-white border border-pink-200 py-2 rounded-lg text-sm font-medium text-pink-600 hover:bg-pink-50 transition-all">
                    <i class="fas fa-adjust"></i> កាត់ ៥០/៥០
                </button>
                <button onclick="quizManager.usePowerUp('transOptions')" class="flex-1 bg-white border border-pink-200 py-2 rounded-lg text-sm font-medium text-pink-600 hover:bg-pink-50 transition-all">
                    <i class="fas fa-list-ul"></i> បកប្រែចម្លើយ
                </button>
            </div>

            <!-- Question Card -->
            <div class="glass-card rounded-2xl p-6 shadow-xl mb-6">
                <div class="flex justify-between items-start mb-4">
                    <span id="question-category" class="bg-pink-100 text-pink-700 px-3 py-1 rounded-full text-xs font-bold uppercase"></span>
                    <span id="question-number" class="text-gray-400 font-bold"></span>
                </div>
                
                <div class="flex items-start gap-3 mb-6">
                    <button id="tts-btn" onclick="quizManager.speakQuestion()" class="mt-1 bg-pink-500 hover:bg-pink-600 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md shrink-0">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <div>
                        <h3 id="question-text" class="text-lg korean leading-relaxed font-medium text-gray-800"></h3>
                        <p id="question-translate" class="hidden mt-2 text-gray-500 italic text-sm"></p>
                    </div>
                </div>

                <div id="options-container" class="space-y-3">
                    <!-- Options injected here -->
                </div>
            </div>

            <!-- Explanation Area -->
            <div id="explanation-card" class="hidden glass-card rounded-2xl p-6 shadow-xl mb-6 border-l-8 border-pink-500">
                <h4 class="font-bold text-pink-700 mb-2 italic underline text-sm">ការពន្យល់លម្អិត៖</h4>
                <div id="explanation-content" class="text-sm text-gray-700 leading-relaxed space-y-2"></div>
                <button onclick="quizManager.next()" class="w-full mt-6 bg-pink-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-pink-700">
                    បន្ទាប់ <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden glass-card rounded-2xl p-8 text-center shadow-xl">
            <h2 class="text-3xl font-bold mb-2 text-gray-800">លទ្ធផលរបស់អ្នក</h2>
            <div id="score-display" class="text-6xl font-black text-pink-600 my-6">0/30</div>
            <p id="result-message" class="text-gray-600 mb-8"></p>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="location.reload()" class="bg-gray-100 text-gray-700 py-3 rounded-xl font-bold">
                    ធ្វើឡើងវិញ
                </button>
                <button onclick="quizManager.reviewMode()" class="bg-pink-600 text-white py-3 rounded-xl font-bold">
                    ផ្ទៀងផ្ទាត់ចម្លើយ
                </button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            // Vocabulary & Grammar (1-10)
            {
                category: "ពាក្យសព្ទ និងវេយ្យាករណ៍",
                question: "가: 라흐만 씨는 한국말을 아주 잘하네요.\n나: 아니요, 아직 실수를 ( ).",
                translate: "ក៖ លោក រ៉ាម៉ាន់ និយាយភាសាកូរ៉េពូកែណាស់។\nខ៖ ទេ ខ្ញុំនៅតែ (ហាក់ដូចជាធ្វើខុសច្រើនដែរ)។",
                options: ["많이 하는 편이에요", "많이 한 적이 있어요", "많이 하고 싶어요", "많이 해서 다행이에요"],
                answer: 0,
                explanation: "ប្រើ <b>-는 편이다</b> ដើម្បីបញ្ជាក់ពីទំនោរ ឬចរិតលក្ខណៈទូទៅ។ <b>하다</b> + <b>-는 편이다</b> → <b>하는 편이에요</b>។",
                khmerOptions: ["ហាក់ដូចជាធ្វើខុសច្រើនដែរ", "ធ្លាប់ធ្វើខុសច្រើន", "ចង់ធ្វើខុសច្រើន", "សំណាងហើយដែលធ្វើខុសច្រើន"]
            },
            {
                category: "ពាក្យសព្ទ និងវេយ្យាករណ៍",
                question: "가: 제주도에 ( )?\n나: 네, 작년에 가족들과 같이 갔었어요.",
                translate: "ក៖ តើអ្នក (ធ្លាប់ទៅ) កោះជេជូទេ?\nខ៖ បាទ កាលពីឆ្នាំមុន ខ្ញុំបានទៅជាមួយគ្រួសារ។",
                options: ["간 적이 있어요", "가 본 적이 있어요", "가고 싶어요", "가 본 적이 없어요"],
                answer: 1,
                explanation: "ប្រើ <b>-은/ㄴ 적이 있다</b> ដើម្បីសួរពីបទពិសោធន៍។ ជាទូទៅប្រើជាមួយ <b>-아/어 보다</b> (សាកល្បង) ទៅជា <b>-본 적이 있다</b>។",
                khmerOptions: ["ធ្លាប់ទៅ", "ធ្លាប់បានទៅលេង", "ចង់ទៅ", "មិនធ្លាប់បានទៅលេង"]
            },
            {
                category: "ពាក្យសព្ទ និងវេយ្យាករណ៍",
                question: "가: 왜 그렇게 얼굴이 빨개졌어요?\n나: 사람들 앞에서 실수를 해서 너무 ( ).",
                translate: "ក៖ ហេតុអ្វីបានជាមុខក្រហមម្ល៉េះ?\nខ៖ មកពីខ្ញុំធ្វើខុសនៅមុខមនុស្សច្រើនពេក ទើបមានអារម្មណ៍ (ខ្មាសគេ)។",
                options: ["당황했어요", "창피했어요", "속상했어요", "무서웠어요"],
                answer: 1,
                explanation: "<b>창피하다</b> មានន័យថា ខ្មាសគេ (Embarrassed)។",
                khmerOptions: ["ភ័យស្លន់ស្លោ", "ខ្មាសគេ", "ខូចចិត្ត", "ខ្លាច"]
            },
            {
                category: "ពាក្យសព្ទ និងវេយ្យាករណ៍",
                question: "저는 가끔 다른 사람의 신발을 제 신발로 ( ) 신어요.",
                translate: "ជួនកាលខ្ញុំ (ច្រឡំ) យកស្បែកជើងអ្នកដទៃមកពាក់ ស្មានតែជារបស់ខ្លួនឯង។",
                options: ["오해해서", "착각해서", "걱정해서", "무시해서"],
                answer: 1,
                explanation: "<b>착각하다</b> មានន័យថា ច្រឡំ ឬភាន់ច្រឡំ (To mistake one thing for another)។",
                khmerOptions: ["យល់ច្រឡំ (លើរឿងហេតុ)", "ភាន់ច្រឡំ/ស្មានថា", "បារម្ភ", "មើលងាយ"]
            },
            {
                category: "ពាក្យសព្ទ និងវេយ្យាករណ៍",
                question: "가: 지갑을 어디에 두었는지 생각이 안 나요.\n나: 요즘 ( )이/가 심한 것 같아요. 조심하세요.",
                translate: "ក៖ ខ្ញុំនឹកមិនឃើញថាដាក់កាបូបលុយនៅឯណាទេ។\nខ៖ មួយរយៈនេះ ហាក់ដូចជា (ជំងឺភ្លេចភ្លាំង) ធ្ងន់ធ្ងរហើយ។ ប្រយ័ត្នផង។",
                options: ["건망증", "기억력", "몸살", "두통"],
                answer: 0,
                explanation: "<b>건망증</b> គឺជំងឺភ្លេចភ្លាំង (Forgetfulness)។",
                khmerOptions: ["ជំងឺភ្លេចភ្លាំង", "ការចងចាំ", "ជំងឺឈឺខ្លួនប្រាណ", "ការឈឺក្បាល"]
            },
            {
                category: "ពាក្យសព្ទ និងវេយ្យាករណ៍",
                question: "가: 한국 음식을 잘 먹어요?\n나: 네, 저는 한국 음식을 매일 ( ).",
                translate: "ក៖ តើអ្នកញ៉ាំអាហារកូរ៉េបានទេ?\nខ៖ បាទ ខ្ញុំ (ហាក់ដូចជាញ៉ាំ) អាហារកូរ៉េរាល់ថ្ងៃដែរ។",
                options: ["먹은 적이 있는 편이에요", "먹는 편이에요", "먹는 적이 없어요", "먹은 편이에요"],
                answer: 1,
                explanation: "<b>-는 편이다</b> ប្រើជាមួយកិរិយាសព្ទបច្ចុប្បន្ន ដើម្បីបង្ហាញពីសកម្មភាពដែលធ្វើជាប្រចាំ ឬជាទម្លាប់។",
                khmerOptions: ["ហាក់ដូចជាធ្លាប់ញ៉ាំ", "ហាក់ដូចជាញ៉ាំ/រៀងញ៉ាំដែរ", "មិនដែលញ៉ាំ", "ហាក់ដូចជាបានញ៉ាំ"]
            },
            {
                category: "ពាក្យសព្ទ និងវេយ្យាករណ៍",
                question: "가: 자야 씨는 성격이 어때요?\n나: 자야 씨는 말이 많지 않고 ( ).",
                translate: "ក៖ តើចរិតរបស់ ចាយ៉ា យ៉ាងម៉េចដែរ?\nខ៖ ចាយ៉ា មិនសូវនិយាយច្រើនទេ គឺ (ហាក់ដូចជាមនុស្សស្ងប់ស្ងាត់)។",
                options: ["급한 편이에요", "조용한 편이에요", "활발한 편이에요", "착한 적이 있어요"],
                answer: 1,
                explanation: "<b>조용하다</b> (ស្ងប់ស្ងាត់) + <b>-ㄴ 편이다</b> → <b>조용한 편이에요</b>។",
                khmerOptions: ["រៀងចិត្តក្ដៅ", "រៀងស្ងប់ស្ងាត់", "រៀងរស់រវើក", "ធ្លាប់ចិត្តល្អ"]
            },
            {
                category: "ពាក្យសព្ទ និងវេយ្យាករណ៍",
                question: "갑자기 모르는 사람이 아는 척을 해서 아주 ( ).",
                translate: "ស្រាប់តែមានអ្នកមិនស្គាល់មកធ្វើជាស្គាល់ ធ្វើឱ្យខ្ញុំ (ភ័យស្លន់ស្លោ/ធ្វើអ្វីមិនត្រូវ) ខ្លាំងណាស់។",
                options: ["당황했어요", "즐거웠어요", "슬펐어요", "창피했어요"],
                answer: 0,
                explanation: "<b>당황하다</b> ប្រើនៅពេលមានរឿងកើតឡើងភ្លាមៗ ហើយយើងធ្វើអ្វីមិនត្រូវ (Flustered/Panicked)។",
                khmerOptions: ["ភ័យស្លន់ស្លោ/ធ្វើអ្វីមិនត្រូវ", "សប្បាយចិត្ត", "ខូចចិត្ត", "ខ្មាសគេ"]
            },
            {
                category: "ពាក្យសព្ទ និងវេយ្យាករណ៍",
                question: "가: 한국 노래를 ( )?\n나: 네, 어제 노래방에서 불렀어요.",
                translate: "ក៖ តើអ្នក (ធ្លាប់ច្រៀង) បទចម្រៀងកូរ៉េទេ?\nខ៖ បាទ ម្សិលមិញខ្ញុំបានច្រៀងនៅណូរ៉េបាំង។",
                options: ["부른 적이 있어요", "부르는 편이에요", "부르고 싶어요", "부른 적이 없어요"],
                answer: 0,
                explanation: "<b>부르다</b> (ច្រៀង) + <b>-ㄴ 적이 있다</b> → <b>부른 적이 있어요</b>។",
                khmerOptions: ["ធ្លាប់ច្រៀង", "រៀងចូលចិត្តច្រៀង", "ចង់ច្រៀង", "មិនដែលច្រៀង"]
            },
            {
                category: "ពាក្យសព្ទ និងវេយ្យាករណ៍",
                question: "친구의 전화를 제 전화로 ( ) 받아 버렸어요.",
                translate: "ខ្ញុំបាន (ច្រឡំ/ស្មានតែ) ទូរស័ព្ទមិត្តភក្តិជាទូរស័ព្ទខ្ញុំ ក៏ទទួលបាត់ទៅ។",
                options: ["오해해서", "이해해서", "착각해서", "실수해서"],
                answer: 2,
                explanation: "<b>착각하다</b> គឺការភាន់ច្រឡំវត្ថុមួយទៅវត្ថុមួយទៀត។",
                khmerOptions: ["យល់ច្រឡំ", "យល់ពីបញ្ហា", "ភាន់ច្រឡំ/ស្មានថា", "ធ្វើខុស"]
            },

            // Reading (11-25)
            {
                category: "ការអានយល់ន័យ",

        const quizManager = {

                document.getElementById('question-category').innerText = q.category;

                if(this.isAnswered) return;

                    btns[choiceIdx].classList.add('bg-red-100', 'border-red-500');

                document.getElementById('explanation-content').innerHTML = `

                            removed++;

                const googleUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(cleanText)}&tl=${lang.split('-')[0]}&client=tw-ob`;
                const audio = new Audio(googleUrl);
                audio.play().catch(() => {
                    const msg = new SpeechSynthesisUtterance();
                    msg.text = cleanText;
                    msg.lang = lang;
                    window.speechSynthesis.speak(msg);
                });
            },

        };

        window.addEventListener('keydown', (e) => {
            if(e.key >= 1 && e.key <= 4) quizManager.checkAnswer(parseInt(e.key) - 1);
            if(e.key === 'Enter' && quizManager.isAnswered) quizManager.next();
        });
    </script>
</body>
</html>
